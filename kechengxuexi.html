// 当前选中状态
let currentChapterId = 1;
let currentSectionId = '1-1';
let isViewingChapter = true; // 是否查看主章节内容
let sidebarCollapsed = false; // 侧边栏是否折叠

// 切换侧边栏
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  const sidebar = document.getElementById('sidebar');
  const toggleBtn = document.getElementById('toggleSidebar');
  const icon = toggleBtn.querySelector('i');
  const sidebarHeaderContent = document.getElementById('sidebarHeaderContent');
  const sidebarInfo = document.getElementById('sidebarInfo');
  const sidebarProgress = document.getElementById('sidebarProgress');
  const sidebarHeader = document.getElementById('sidebarHeader');
  
  if (sidebarCollapsed) {
    sidebar.classList.remove('w-72');
    sidebar.classList.add('w-12');
    icon.classList.remove('fa-angle-left');
    icon.classList.add('fa-angle-right');
    // 隐藏多余的内容
    sidebarHeaderContent.style.display = 'none';
    sidebarInfo.style.display = 'none';
    sidebarProgress.style.display = 'none';
    sidebarHeader.classList.remove('px-5', 'py-4');
    sidebarHeader.classList.add('px-1', 'py-3');
  } else {
    sidebar.classList.remove('w-12');
    sidebar.classList.add('w-72');
    icon.classList.remove('fa-angle-right');
    icon.classList.add('fa-angle-left');
    // 显示内容
    sidebarHeaderContent.style.display = '';
    sidebarInfo.style.display = '';
    sidebarProgress.style.display = '';
    sidebarHeader.classList.remove('px-1', 'py-3');
    sidebarHeader.classList.add('px-5', 'py-4');
  }
  renderChapterList();
}

// 获取状态图标
function getStatusIcon(status) {
  if (status === 'done') return '<i class="fa fa-check-circle text-green-500 text-xs"></i>';
  if (status === 'current') return '<span class="w-2 h-2 bg-blue-500 rounded-full inline-block animate-pulse"></span>';
  return '<i class="fa fa-circle-o text-gray-300 text-xs"></i>';
}

// 获取类型图标
function getTypeIcon(type) {
  if (type === 'video') return '<i class="fa fa-play-circle text-blue-400 text-xs"></i>';
  if (type === 'reading') return '<i class="fa fa-file-text-o text-orange-400 text-xs"></i>';
  if (type === 'quiz') return '<i class="fa fa-pencil-square-o text-purple-400 text-xs"></i>';
  return '<i class="fa fa-file-o text-gray-400 text-xs"></i>';
}

// 获取章节完成进度（包含主章节自身+所有子小节）：学习中不算完成
function getChapterProgress(chapter) {
  const total = chapter.sections.length + 1; // +1 for the chapter itself
  // 只统计状态为done的
  const done = chapter.sections.filter(s => s.status === 'done').length;
  const chapterDone = chapter.quizCompleted ? 1 : 0;
  const totalDone = done + chapterDone;
  return { done: totalDone, total, percent: Math.round((totalDone / total) * 100) };
}

// 渲染左侧章节菜单
function renderChapterList() {
  const container = document.getElementById('chapterList');
  let html = '';

  if (sidebarCollapsed) {
    // 折叠状态：只显示小图标
    courseData.forEach(chapter => {
      const isChapterActive = chapter.id === currentChapterId && isViewingChapter;
      const iconClass = chapter.quizCompleted 
        ? '<i class="fa fa-check-circle text-green-500 text-sm"></i>'
        : `<i class="fa fa-folder text-gray-400 ${isChapterActive ? 'text-blue-500' : ''} text-sm"></i>`;
      html += `
        <div class="chapter-item ${isChapterActive ? 'active' : ''} flex justify-center py-2">
          <div class="chapter-header cursor-pointer ${isChapterActive ? 'bg-blue-50' : ''} p-2 rounded-md" onclick="selectChapter(${chapter.id})" title="${chapter.title}">
            ${iconClass}
          </div>
        </div>
      `;
      // 添加子章节图标
      chapter.sections.forEach(section => {
        const isSectionActive = section.id === currentSectionId && chapter.id === currentChapterId && !isViewingChapter;
        html += `
          <div class="flex justify-center py-1">
            <div class="section-item ${isSectionActive ? 'active' : ''} cursor-pointer p-2 rounded-md ${isSectionActive ? 'bg-blue-50' : ''}" onclick="selectSection(${chapter.id}, '${section.id}', event)" title="${section.title}">
              ${getTypeIcon(section.type)}
            </div>
          </div>
        `;
      });
    });
  } else {
    // 展开状态：正常显示
    courseData.forEach(chapter => {
      const isChapterActive = chapter.id === currentChapterId && isViewingChapter;
      const isCurrentChapter = chapter.id === currentChapterId;
      const progress = getChapterProgress(chapter);

      html += `
        <div class="chapter-item ${isChapterActive ? 'active' : ''}">
          <!-- 章节标题 -->
          <div class="chapter-header cursor-pointer ${isChapterActive ? 'bg-blue-50' : ''}" onclick="selectChapter(${chapter.id})">
            <div class="px-4 py-3">
              <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2 flex-1 min-w-0">
                  <span class="chapter-title text-sm ${isCurrentChapter ? 'text-blue-600 font-semibold' : 'text-gray-700'} truncate">${chapter.title}</span>
                  ${chapter.quizCompleted ? '<i class="fa fa-check-circle text-green-500 text-sm flex-shrink-0"></i>' : ''}
                </div>
                <i class="fa fa-angle-down text-gray-400 text-xs flex-shrink-0 ml-2 transition-transform"></i>
              </div>
              <!-- 进度条 -->
              <div class="flex items-center mt-2 ml-6">
                <div class="flex-1 bg-gray-100 rounded-full h-1 mr-2">
                  <div class="h-1 rounded-full ${progress.percent === 100 ? 'bg-green-500' : 'bg-blue-400'}" style="width:${progress.percent}%"></div>
                </div>
                <span class="text-xs text-gray-400 flex-shrink-0">${progress.done}/${progress.total}</span>
              </div>
            </div>
          </div>

          <!-- 小节列表（始终展开）-->
          <div class="pb-2 bg-gray-50/30">
            ${chapter.sections.map(section => {
              const isSectionActive = section.id === currentSectionId && chapter.id === currentChapterId && !isViewingChapter;
              return `
              <div class="section-item ${isSectionActive ? 'active' : ''} flex items-center px-4 py-2.5 ml-4 mr-2 rounded-md cursor-pointer" onclick="selectSection(${chapter.id}, '${section.id}', event)">
                <span class="mr-2 flex-shrink-0">${getStatusIcon(section.status)}</span>
                <span class="mr-2 flex-shrink-0">${getTypeIcon(section.type)}</span>
                <span class="section-title text-xs ${isSectionActive ? 'text-indigo-600 font-semibold' : section.status === 'current' ? 'text-blue-600' : section.status === 'done' ? 'text-gray-600' : section.status === 'not_started' ? 'text-gray-400' : 'text-gray-400'} truncate flex-1">${section.title}</span>
                <span class="text-xs text-gray-300 flex-shrink-0 ml-1">${section.duration}</span>
              </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    });
  }

  container.innerHTML = html;
}

// 渲染右侧内容区

  const container = document.getElementById('mainContent');
  const chapter = courseData.find(c => c.id === currentChapterId);

  if (isViewingChapter) {

}

// 获取所有小节的扁平列表
function getFlatSectionList() {
  const list = [];
  courseData.forEach(chapter => {
    chapter.sections.forEach(section => {
      list.push({ chapterId: chapter.id, sectionId: section.id });
    });
  });
  return list;
}

// 上一节
function prevSection() {
  const list = getFlatSectionList();
  const idx = list.findIndex(i => i.chapterId === currentChapterId && i.sectionId === currentSectionId);
  if (idx > 0) {
    const prev = list[idx - 1];
    selectSection(prev.chapterId, prev.sectionId);
  }
}

// 下一节
function nextSection() {
  const list = getFlatSectionList();
  const idx = list.findIndex(i => i.chapterId === currentChapterId && i.sectionId === currentSectionId);
  if (idx < list.length - 1 && idx !== -1) {
    const next = list[idx + 1];
    selectSection(next.chapterId, next.sectionId);
  }
}

function unbindFile(){
    if(!confirm('解除文件绑定？\n之后修改仅保存到本地浏览器。'))return;
    fileHandle=null;clearHandleFromIDB();updateBindBtn();showHint('已解除绑定');
}
function writeToFile(){
    if(!fileHandle)return;
    return (async function(){
        try{
            var f=await fileHandle.getFile();var html=await f.text();
            var json=JSON.stringify({annotations:annotations,meta:{savedAt:new Date().toISOString(),savedAtLocal:new Date().toLocaleString(),version:VER}},null,2);
            var reg=/<script[^>]*id=["']annotation-tool-data["'][^>]*>[\s\S]*?<\/script>/i;
            var tag='<script type="application/json" id="annotation-tool-data">'+json+'<\/script>';
            html=reg.test(html)?html.replace(reg,tag):html.replace(/<\/body>/i,tag+'\n</body>');
            var w=await fileHandle.createWritable();await w.write(html);await w.close();
            showSaveStatus('✓ 已写入文件 '+new Date().toLocaleTimeString().slice(0,5));
        }catch(e){console.error(LOG,'写文件失败',e);showSaveStatus('⚠ 写文件失败');}
    })();
}
function openIDB(){return new Promise(function(res,rej){var r=indexedDB.open('ann-tool',1);r.onupgradeneeded=function(){r.result.createObjectStore('handles');};r.onsuccess=function(){res(r.result);};r.onerror=function(){rej(r.error);};});}
async function saveHandleToIDB(h){try{var db=await openIDB();db.transaction('handles','readwrite').objectStore('handles').put(h,location.pathname);}catch(e){}}
async function loadHandleFromIDB(){try{var db=await openIDB();return await new Promise(function(res){var rq=db.transaction('handles','readonly').objectStore('handles').get(location.pathname);rq.onsuccess=function(){res(rq.result);};rq.onerror=function(){res(null);};});}catch(e){return null;}}
async function clearHandleFromIDB(){try{var db=await openIDB();db.transaction('handles','readwrite').objectStore('handles').delete(location.pathname);}catch(e){}}
async function tryRestoreHandle(){
    if(!supportsFS())return;
    var h=await loadHandleFromIDB();if(!h)return;
    try{
        var p=await h.queryPermission({mode:'readwrite'});
        if(p==='granted'){fileHandle=h;updateBindBtn();showSaveStatus('✓ 已恢复绑定：'+h.name);console.log(LOG,'恢复文件绑定：',h.name);}
        else if(p==='prompt'){showRestorePrompt(h);}
    }catch(e){}
}
function showRestorePrompt(h){
    var bar=document.createElement('div');bar.className='ann-restore';
    bar.innerHTML='<span>📎 检测到曾绑定文件 <b>'+h.name+'</b>，恢复绑定？</span><button class="ok">恢复</button><button class="no">忽略</button>';
    document.body.appendChild(bar);
    bar.querySelector('.ok').onclick=async function(){
        try{var p=await h.requestPermission({mode:'readwrite'});if(p==='granted'){fileHandle=h;updateBindBtn();showHint('✅ 恢复成功');bar.remove();}else alert('未授权');}
        catch(e){alert(e.message);}
    };
    bar.querySelector('.no').onclick=function(){bar.remove();};
}
function updateBindBtn(){
    var btn=document.getElementById('ann-bind');if(!btn)return;
    if(fileHandle){btn.textContent='📎 已绑定';btn.classList.add('bound');btn.title='已绑定：'+fileHandle.name+'（点击解绑）';}
    else{btn.textContent='📎 绑定';btn.classList.remove('bound');btn.title='绑定 HTML 文件，自动写回（Chrome/Edge）';}
}

/* ========== 工具/通用 ========== */
function cssEscape(s){return (window.CSS&&CSS.escape)?CSS.escape(s):String(s).replace(/([^\w-])/g,'\\$1');}
function isToolEl(n){if(!n||n.nodeType!==1)return false;var c=n.className;if(typeof c!=='string')c=(c&&c.baseVal)||'';return /\bann-/.test(c)||(n.id&&/^ann-/.test(n.id));}
function isVisible(el){if(!el)return false;var s=window.getComputedStyle(el);if(s.display==='none'||s.visibility==='hidden'||parseFloat(s.opacity||'1')===0)return false;var r=el.getBoundingClientRect();return r.width>0&&r.height>0;}
function txt(el,n){if(!el)return '';var t=(el.innerText||el.textContent||'').replace(/\s+/g,' ').trim();return n?t.slice(0,n):t;}

/* ========== 弹窗检测 ========== */
var MODAL_EXPLICIT='[role="dialog"],[role="alertdialog"],[aria-modal="true"]';
var MODAL_FUZZY='[class*="modal" i],[class*="dialog" i],[class*="drawer" i],[class*="popup" i],[class*="layer" i],[class*="sheet" i],[class*="overlay" i],[class*="lightbox" i],[id*="modal" i],[id*="dialog" i],[id*="popup" i]';
function detectLayers(){
    var layers=[],seen=[];
    try{
        var all=[],ex=document.querySelectorAll(MODAL_EXPLICIT),fz=document.querySelectorAll(MODAL_FUZZY);
        for(var i=0;i<ex.length;i++)all.push(ex[i]);
        for(var i=0;i<fz.length;i++)all.push(fz[i]);
        var fixedNodes=document.querySelectorAll('div,section,aside,form');
        for(var i=0;i<fixedNodes.length;i++){
            var s=window.getComputedStyle(fixedNodes[i]);if(s.position!=='fixed')continue;
            var r=fixedNodes[i].getBoundingClientRect();if(r.width<200||r.height<100)continue;
            if(r.width*r.height<window.innerWidth*window.innerHeight*0.08)continue;
            all.push(fixedNodes[i]);
        }
        for(var i=0;i<all.length;i++){
            var n=all[i];if(!n||isToolEl(n)||!isVisible(n))continue;if(seen.indexOf(n)>=0)continue;
            var r=n.getBoundingClientRect();if(r.width<150||r.height<80)continue;
            var cls=typeof n.className==='string'?n.className:'';if(/^(ann-|\s)/.test(cls))continue;
            if(/(^|\s)(mask|backdrop|modal-mask|dialog-mask|ant-modal-mask|el-overlay|modal-backdrop)(\s|$)/i.test(cls)&&txt(n,10).length===0)continue;
            var skip=false;
            for(var j=0;j<seen.length;j++){
                if(seen[j].contains(n)){seen.splice(j,1);layers.splice(j,1);j--;}
                else if(n.contains(seen[j])){skip=true;break;}
            }
            if(skip)continue;
            seen.push(n);layers.push({el:n,z:parseInt(window.getComputedStyle(n).zIndex)||0,key:layerKey(n)});
        }
    }catch(e){}
    layers.sort(function(a,b){return a.z-b.z;});return layers;
}
function layerKey(el){
    if(!el)return '';
    if(el.dataset&&el.dataset.annLayerKey)return el.dataset.annLayerKey;
    if(el.id)return 'id:'+el.id;
    var cls=(typeof el.className==='string'?el.className:'').slice(0,50),title='';
    try{var t=el.querySelector('[class*="title" i],[class*="header" i],[role="heading"],h1,h2,h3');if(t)title=txt(t,60);}catch(e){}
    var key='lk:'+hashStr(cls+'|'+title+'|'+txt(el,150));
    try{el.dataset.annLayerKey=key;}catch(e){}
    return key;
}
function layerTitle(el){try{var t=el.querySelector('[class*="title" i],[class*="header" i],[role="heading"],h1,h2,h3');if(t&&txt(t,40))return txt(t,40);}catch(e){}return txt(el,30)||'未命名图层';}
function getActiveScope(){
    var stack=detectLayers();
    if(manualLayer==='page')return {layer:'page',layerKey:'',depth:0,el:null,name:'主页（手动）'};
    if(manualLayer&&manualLayer.indexOf('layer:')===0){
        var t=manualLayer.slice(6);
        for(var i=0;i<stack.length;i++)if(stack[i].key===t)return {layer:'modal',layerKey:t,depth:i+1,el:stack[i].el,name:'图层 L'+(i+1)+'（手动）'};
        manualLayer=null;try{localStorage.removeItem(LKEY);}catch(e){}
    }
    if(!stack.length)return {layer:'page',layerKey:'',depth:0,el:null,name:'主页'};
    var top=stack[stack.length-1];
    return {layer:'modal',layerKey:top.key,depth:stack.length,el:top.el,name:'图层 L'+stack.length+'：'+layerTitle(top.el)};
}
function detectScopeAt(anchorEl){
    var stack=detectLayers();
    if(!stack.length||!anchorEl)return {layer:'page',layerKey:'',depth:0,el:null};
    for(var i=stack.length-1;i>=0;i--)if(stack[i].el.contains(anchorEl))return {layer:'modal',layerKey:stack[i].key,depth:i+1,el:stack[i].el};
    return {layer:'page',layerKey:'',depth:0,el:null};
}

/* ========== 锚定 ========== */
function isAnchor(n){if(!n||n===document.body||n===document.documentElement||isToolEl(n))return false;var s=window.getComputedStyle(n);if(s.position==='fixed')return true;if(n.matches&&n.matches(MODAL_EXPLICIT))return true;if(n.id){var r=n.getBoundingClientRect();if(r.width>=300&&r.height>=150)return true;}return false;}
function findAnchor(el){while(el&&el!==document.body){if(isAnchor(el))return el;el=el.parentElement;}return document.body;}
function buildSelector(el){
    if(!el||el===document.body)return 'body';if(el.id)return '#'+cssEscape(el.id);
    var parts=[],n=el;
    while(n&&n!==document.body&&parts.length<6){
        var t=n.tagName.toLowerCase();
        if(n.id){parts.unshift('#'+cssEscape(n.id));break;}
        var p=n.parentElement;
        if(p){var sb=Array.prototype.filter.call(p.children,function(c){return c.tagName===n.tagName;});if(sb.length>1)t+=':nth-of-type('+(sb.indexOf(n)+1)+')';}
        parts.unshift(t);n=n.parentElement;
    }
    return parts.join('>')||'body';
}
function resolveAnchor(sel){if(!sel||sel==='body')return document.body;try{return document.querySelector(sel)||document.body;}catch(e){return document.body;}}
function ensurePositioned(c){if(c===document.body)return;if(window.getComputedStyle(c).position==='static')c.style.position='relative';}
function locateAt(cx,cy,px,py){
    var stack=document.elementsFromPoint?document.elementsFromPoint(cx,cy):[document.elementFromPoint(cx,cy)];
    var el=null;for(var i=0;i<stack.length;i++){if(stack[i]&&!isToolEl(stack[i])){el=stack[i];break;}}
    var c=findAnchor(el||document.body),sel=buildSelector(c),rx,ry;
    if(c===document.body){rx=px;ry=py;}else{var r=c.getBoundingClientRect();rx=cx-r.left+(c.scrollLeft||0);ry=cy-r.top+(c.scrollTop||0);}
    return {container:c,selector:sel,relX:rx,relY:ry,elementAtPoint:el};
}

/* ========== 工具栏 ========== */
function getSavedPos(){try{var s=localStorage.getItem(TKEY);if(!s)return null;var p=JSON.parse(s);if(typeof p.left==='number'&&typeof p.top==='number')return p;}catch(e){}return null;}
function savePos(l,t){try{localStorage.setItem(TKEY,JSON.stringify({left:l,top:t}));}catch(e){}}
function clampBar(b){var r=b.getBoundingClientRect(),l=parseFloat(b.style.left),t=parseFloat(b.style.top);if(isNaN(l)||isNaN(t))return;b.style.left=Math.max(4,Math.min(l,window.innerWidth-r.width-4))+'px';b.style.top=Math.max(4,Math.min(t,window.innerHeight-r.height-4))+'px';}
function createToolbar(){
    if(document.getElementById('ann-toolbar')||!document.body)return;
    var bar=document.createElement('div');bar.className='ann-toolbar';bar.id='ann-toolbar';
    bar.innerHTML='<div class="ann-drag-handle" id="ann-drag-handle" title="拖动工具栏">⋮⋮</div>'+
        '<button class="ann-btn" id="ann-toggle">🔖 启用</button>'+
        '<span class="ann-layer page" id="ann-layer" title="点击切换图层">📍 主页</span>'+
        '<span class="ann-count" id="ann-count" title="点击查看隐藏备注">0 条</span>'+
        '<button class="ann-btn" id="ann-bind" title="绑定 HTML 文件，自动写回">📎 绑定</button>'+
        '<button class="ann-btn export" id="ann-export" title="导出副本（兜底）">📥 导出</button>'+
        '<span class="ann-save-status" id="ann-save-status"></span>';
    var sv=getSavedPos();
    if(sv){bar.style.left=sv.left+'px';bar.style.top=sv.top+'px';}else{bar.style.right='20px';bar.style.bottom='20px';}
    document.body.appendChild(bar);
    if(!sv){var r=bar.getBoundingClientRect();bar.style.left=r.left+'px';bar.style.top=r.top+'px';bar.style.right='auto';bar.style.bottom='auto';}
    clampBar(bar);
    document.getElementById('ann-toggle').addEventListener('click',toggleEnabled);
    document.getElementById('ann-export').addEventListener('click',exportFile);
    document.getElementById('ann-count').addEventListener('click',showHiddenList);
    document.getElementById('ann-layer').addEventListener('click',showLayerPicker);
    document.getElementById('ann-bind').addEventListener('click',function(){fileHandle?unbindFile():bindFile();});
    document.getElementById('ann-drag-handle').addEventListener('mousedown',onToolbarDown);
    try{var ml=localStorage.getItem(LKEY);if(ml)manualLayer=ml;}catch(e){}
    if(!supportsFS()){var bb=document.getElementById('ann-bind');bb.style.display='none';}
}
function onToolbarDown(e){e.preventDefault();e.stopPropagation();var b=document.getElementById('ann-toolbar');if(!b)return;var r=b.getBoundingClientRect();toolbarDrag={sx:e.clientX,sy:e.clientY,sl:r.left,st:r.top,moved:false};b.classList.add('dragging');}
function onToolbarMove(e){if(!toolbarDrag)return;var dx=e.clientX-toolbarDrag.sx,dy=e.clientY-toolbarDrag.sy;if(!toolbarDrag.moved&&Math.hypot(dx,dy)<3)return;toolbarDrag.moved=true;var b=document.getElementById('ann-toolbar');b.style.left=(toolbarDrag.sl+dx)+'px';b.style.top=(toolbarDrag.st+dy)+'px';}
function onToolbarUp(){if(!toolbarDrag)return;var b=document.getElementById('ann-toolbar');if(b){b.classList.remove('dragging');clampBar(b);if(toolbarDrag.moved)savePos(parseFloat(b.style.left),parseFloat(b.style.top));}toolbarDrag=null;}

/* ========== 图层指示 ========== */
function updateLayerIndicator(){
    var el=document.getElementById('ann-layer');if(!el)return;
    var a=getActiveScope();
    el.className='ann-layer'+(a.layer==='page'?' page':'');
    el.textContent='📍 '+a.name;el.title='当前层级：'+a.name+'\n点击手动切换';
}
function showLayerPicker(){
    closePopups();var stack=detectLayers(),active=getActiveScope();
    var p=document.createElement('div');p.className='ann-popup';p.style.left='50%';p.style.top='50%';p.style.transform='translate(-50%,-50%)';
    var html='<div class="ann-meta">🧭 选择当前图层<br>自动识别：<b>'+active.name+'</b></div><div class="ann-layer-list">';
    html+='<div class="ann-layer-item'+(manualLayer==null?' cur':'')+'" data-v="auto"><b>🤖 自动识别</b><small>让工具自动判断</small></div>';
    html+='<div class="ann-layer-item'+(manualLayer==='page'?' cur':'')+'" data-v="page"><b>🏠 主页</b><small>只显示主页备注</small></div>';
    if(stack.length){stack.forEach(function(l,i){var cur=manualLayer==='layer:'+l.key;html+='<div class="ann-layer-item'+(cur?' cur':'')+'" data-v="layer:'+l.key+'"><b>📋 图层 L'+(i+1)+'：'+layerTitle(l.el)+'</b><small>'+((typeof l.el.className==='string'?l.el.className:'').slice(0,60)||'(无 class)')+'</small></div>';});}
    else{html+='<div style="padding:12px;color:#9ca3af;font-size:12px;text-align:center">未检测到弹窗图层</div>';}
    html+='</div><div class="ann-popup-row"><button class="pb-cancel">关闭</button></div>';
    p.innerHTML=html;document.body.appendChild(p);
    p.querySelector('.pb-cancel').onclick=function(){p.remove();};
    Array.prototype.forEach.call(p.querySelectorAll('.ann-layer-item'),function(it){
        it.onclick=function(){var v=it.dataset.v;if(v==='auto'){manualLayer=null;try{localStorage.removeItem(LKEY);}catch(e){}}else{manualLayer=v;try{localStorage.setItem(LKEY,v);}catch(e){}}p.remove();renderBadges();updateLayerIndicator();showHint('✅ 已切换到：'+getActiveScope().name);};
    });
}

/* ========== 交互 ========== */
function updateCount(){var el=document.getElementById('ann-count');if(!el)return;var t=annotations.length,h=lastHidden.length;if(h>0){el.textContent=(t-h)+'/'+t+' 条';el.classList.add('has-hidden');}else{el.textContent=t+' 条';el.classList.remove('has-hidden');}}
function toggleEnabled(){enabled=!enabled;var btn=document.getElementById('ann-toggle');if(enabled){btn.classList.add('active');btn.textContent='🔖 关闭';document.body.classList.add('ann-on');showHint('已启用 · 当前层级：'+getActiveScope().name,2500);}else{btn.classList.remove('active');btn.textContent='🔖 启用';document.body.classList.remove('ann-on');closePopups();}}
function showHint(m,d){d=d||2200;var o=document.querySelector('.ann-hint');if(o)o.remove();var el=document.createElement('div');el.className='ann-hint';el.textContent=m;document.body.appendChild(el);setTimeout(function(){if(el.parentNode)el.remove();},d);}
function getSeqById(id){var s=annotations.slice().sort(function(a,b){return a.id-b.id;});for(var i=0;i<s.length;i++)if(s[i].id===id)return i+1;return 0;}
function shouldShow(ann,active){if(!ann.scope)return active.layer==='page';if(ann.scope.layer!==active.layer)return false;if(active.layer==='page')return true;return ann.scope.layerKey===active.layerKey;}
function renderBadges(){
    var old=document.querySelectorAll('.ann-badge');for(var i=0;i<old.length;i++)old[i].remove();
    var sorted=annotations.slice().sort(function(a,b){return a.id-b.id;});
    lastHidden=[];var active=getActiveScope();
    sorted.forEach(function(ann,idx){
        var seq=idx+1;
        if(!shouldShow(ann,active)){lastHidden.push({ann:ann,seq:seq,reason:ann.scope.layer==='page'?'主页备注（当前在弹窗）':'其他图层'});return;}
        var c=ann.anchor?resolveAnchor(ann.anchor):document.body;
        if(c!==document.body&&!isVisible(c)){lastHidden.push({ann:ann,seq:seq,reason:'锚点不可见'});return;}
        ensurePositioned(c);
        var x=ann.relX!=null?ann.relX:(ann.x||0),y=ann.relY!=null?ann.relY:(ann.y||0);
        var b=document.createElement('div');b.className='ann-badge'+(ann.scope&&ann.scope.layer==='modal'?' modal':'');
        b.dataset.id=ann.id;b.style.left=x+'px';b.style.top=y+'px';b.textContent=seq;b.title='备注 #'+seq;
        b.addEventListener('mousedown',onBadgeDown);b.addEventListener('click',onBadgeClick);
        c.appendChild(b);
    });
    updateCount();updateLayerIndicator();
}
function showHiddenList(){
    closePopups();var active=getActiveScope();
    if(!lastHidden.length){showHint('当前无隐藏备注 · 层级：'+active.name,2200);return;}
    var p=document.createElement('div');p.className='ann-popup';p.style.left='50%';p.style.top='50%';p.style.transform='translate(-50%,-50%)';
    var html='<div class="ann-meta">🙈 隐藏 '+lastHidden.length+' 条（当前层：'+active.name+'）</div><div class="ann-layer-list">';
    lastHidden.forEach(function(h){var pv=(h.ann.content||'').replace(/\s+/g,' ').slice(0,50);html+='<div class="ann-layer-item" data-id="'+h.ann.id+'"><b>#'+h.seq+'</b> '+pv+'<small>'+h.reason+'</small></div>';});
    html+='</div><div class="ann-popup-row"><button class="pb-cancel">关闭</button></div>';
    p.innerHTML=html;document.body.appendChild(p);
    p.querySelector('.pb-cancel').onclick=function(){p.remove();};
    Array.prototype.forEach.call(p.querySelectorAll('.ann-layer-item'),function(it){it.onclick=function(){var ann=annotations.find(function(a){return a.id===parseInt(it.dataset.id);});if(!ann)return;p.remove();showHiddenDetail(ann);};});
}
function showHiddenDetail(ann){
    var p=document.createElement('div');p.className='ann-popup';p.style.left='50%';p.style.top='50%';p.style.transform='translate(-50%,-50%)';
    var seq=getSeqById(ann.id);
    p.innerHTML='<div class="ann-meta">备注 #'+seq+' · 当前不可见<br>'+ann.createdAt+'</div><div class="ann-view"></div><div class="ann-popup-row">'+(enabled?'<button class="pb-del">删除</button>':'')+'<button class="pb-cancel">关闭</button></div>';
    p.querySelector('.ann-view').textContent=ann.content;document.body.appendChild(p);
    p.querySelector('.pb-cancel').onclick=function(){p.remove();};
    if(enabled)p.querySelector('.pb-del').onclick=function(){if(confirm('确定删除？')){annotations=annotations.filter(function(a){return a.id!==ann.id;});p.remove();renderBadges();autoSave();}};
}
function onBadgeDown(e){e.stopPropagation();e.preventDefault();var id=parseInt(e.currentTarget.dataset.id),ann=annotations.find(function(a){return a.id===id;});if(!ann)return;var c=e.currentTarget.parentElement,r=c.getBoundingClientRect();var cx=ann.relX!=null?ann.relX:(ann.x||0),cy=ann.relY!=null?ann.relY:(ann.y||0);dragState={id:id,container:c,sx:e.clientX,sy:e.clientY,ox:e.clientX-r.left+(c.scrollLeft||0)-cx,oy:e.clientY-r.top+(c.scrollTop||0)-cy,moved:false};}
function onDocMove(e){
    if(toolbarDrag){onToolbarMove(e);return;}
    if(!dragState)return;
    if(Math.hypot(e.clientX-dragState.sx,e.clientY-dragState.sy)>5){
        dragState.moved=true;
        var ann=annotations.find(function(a){return a.id===dragState.id;});
        var c=dragState.container,r=c.getBoundingClientRect();
        var nx=Math.max(0,e.clientX-r.left+(c.scrollLeft||0)-dragState.ox);
        var ny=Math.max(0,e.clientY-r.top+(c.scrollTop||0)-dragState.oy);
        if(ann.anchor||ann.relX!=null){ann.relX=nx;ann.relY=ny;}else{ann.x=nx;ann.y=ny;}
        var b=document.querySelector('.ann-badge[data-id="'+dragState.id+'"]');if(b){b.style.left=nx+'px';b.style.top=ny+'px';b.classList.add('dragging');}
    }
}
function onDocUp(){if(toolbarDrag){onToolbarUp();return;}if(!dragState)return;var b=document.querySelector('.ann-badge[data-id="'+dragState.id+'"]');if(b)b.classList.remove('dragging');if(dragState.moved){suppressNextClick=true;autoSave();}dragState=null;}
function onBadgeClick(e){if(suppressNextClick){suppressNextClick=false;e.stopPropagation();return;}e.stopPropagation();var ann=annotations.find(function(a){return a.id===parseInt(e.currentTarget.dataset.id);});if(ann)showViewPopup(ann,e.currentTarget);}
function onDocClick(e){if(!enabled)return;if(e.target.closest('.ann-toolbar')||e.target.closest('.ann-badge')||e.target.closest('.ann-popup')||e.target.closest('.ann-restore'))return;showEditPopup(null,e.clientX,e.clientY,e.pageX,e.pageY);}
function closePopups(){var ps=document.querySelectorAll('.ann-popup');for(var i=0;i<ps.length;i++)ps[i].remove();}
function showEditPopup(ann,cx,cy,px,py){
    closePopups();
    if(ann&&cx==null){var bd=document.querySelector('.ann-badge[data-id="'+ann.id+'"]');if(bd){var r=bd.getBoundingClientRect();cx=r.right+8;cy=r.top;}else{cx=window.innerWidth/2-190;cy=window.innerHeight/2-100;}}
    var p=document.createElement('div');p.className='ann-popup';
    p.style.left=Math.max(4,Math.min(cx,window.innerWidth-390))+'px';p.style.top=Math.max(4,Math.min(cy,window.innerHeight-260))+'px';
    var seq=ann?getSeqById(ann.id):(annotations.length+1);
    var preview='';
    if(!ann){
        var pc=locateAt(cx,cy,px,py);var scope=detectScopeAt(pc.elementAtPoint||pc.container);
        if(manualLayer==='page')scope={layer:'page',layerKey:''};
        else if(manualLayer&&manualLayer.indexOf('layer:')===0)scope={layer:'modal',layerKey:manualLayer.slice(6)};
        var cls=scope.layer==='modal'?'modal':'page',name=scope.layer==='modal'?'图层备注':'主页备注';
        preview='<div style="margin-bottom:6px"><span class="ann-tag '+cls+'">🏷️ '+name+'</span><span class="ann-tag loc">📍 '+pc.selector+'</span></div>';
    }
    p.innerHTML='<div class="ann-meta">'+(ann?'编辑 #'+seq:'新增 #'+seq)+'</div>'+preview+'<textarea placeholder="请输入备注内容..."></textarea><div class="ann-popup-row">'+(ann?'<button class="pb-del">删除</button>':'')+'<button class="pb-cancel">取消</button><button class="pb-ok">'+(ann?'保存':'添加')+'</button></div>';
    document.body.appendChild(p);
    var ta=p.querySelector('textarea');ta.value=ann?ann.content:'';ta.focus();
    p.querySelector('.pb-cancel').onclick=function(){p.remove();};
    p.querySelector('.pb-ok').onclick=function(){
        var v=ta.value.trim();if(!v){alert('不能为空');return;}
        var now=new Date().toLocaleString();
        if(ann){ann.content=v;ann.updatedAt=now;}
        else{
            var loc=locateAt(cx,cy,px,py),scope=detectScopeAt(loc.elementAtPoint||loc.container);
            if(manualLayer==='page')scope={layer:'page',layerKey:''};
            else if(manualLayer&&manualLayer.indexOf('layer:')===0)scope={layer:'modal',layerKey:manualLayer.slice(6)};
            annotations.push({id:nextId++,anchor:loc.selector,relX:loc.relX,relY:loc.relY,scope:{layer:scope.layer,layerKey:scope.layerKey},content:v,createdAt:now});
        }
        p.remove();renderBadges();autoSave();
    };
    if(ann)p.querySelector('.pb-del').onclick=function(){if(confirm('确定删除？')){annotations=annotations.filter(function(a){return a.id!==ann.id;});p.remove();renderBadges();autoSave();}};
}
function showViewPopup(ann,badge){
    closePopups();var r=badge.getBoundingClientRect(),seq=getSeqById(ann.id);
    var p=document.createElement('div');p.className='ann-popup';p.style.left=(r.right+8)+'px';p.style.top=r.top+'px';
    var tags='';if(ann.scope){var cls=ann.scope.layer==='modal'?'modal':'page';tags+='<span class="ann-tag '+cls+'">🏷️ '+(ann.scope.layer==='modal'?'图层备注':'主页备注')+'</span>';}
    if(ann.anchor&&ann.anchor!=='body')tags+='<span class="ann-tag loc">📍 '+ann.anchor+'</span>';
    p.innerHTML='<div class="ann-meta">备注 #'+seq+' · '+ann.createdAt+(tags?'<br>'+tags:'')+'</div><div class="ann-view"></div><div class="ann-popup-row">'+(enabled?'<button class="pb-del">删除</button><button class="pb-edit">编辑</button>':'')+'<button class="pb-cancel">关闭</button></div>';
    p.querySelector('.ann-view').textContent=ann.content;document.body.appendChild(p);
    var pr=p.getBoundingClientRect();if(pr.right>window.innerWidth)p.style.left=(r.left-pr.width-8)+'px';if(pr.bottom>window.innerHeight)p.style.top=Math.max(4,window.innerHeight-pr.height-4)+'px';
    p.querySelector('.pb-cancel').onclick=function(){p.remove();};
    if(enabled){p.querySelector('.pb-edit').onclick=function(){showEditPopup(ann);};p.querySelector('.pb-del').onclick=function(){if(confirm('确定删除？')){annotations=annotations.filter(function(a){return a.id!==ann.id;});p.remove();renderBadges();autoSave();}};}
}

/* ========== 导出（兜底） ========== */
function exportFile(){
    closePopups();
    var data={annotations:annotations,meta:{savedAt:new Date().toISOString(),savedAtLocal:new Date().toLocaleString(),version:VER}};
    var json=JSON.stringify(data,null,2),html=originalHTMLSnapshot;
    var reg=/<script[^>]*id=["']annotation-tool-data["'][^>]*>[\s\S]*?<\/script>/i;
    var tag='<script type="application/json" id="annotation-tool-data">'+json+'<\/script>';
    html=reg.test(html)?html.replace(reg,tag):html.replace(/<\/body>/i,tag+'\n</body>');
    var blob=new Blob(['<!DOCTYPE html>\n'+html],{type:'text/html;charset=utf-8'}),url=URL.createObjectURL(blob);
    var a=document.createElement('a'),name=(location.pathname.split('/').pop()||'page.html').replace(/\.html?$/i,'');
    a.href=url;a.download=name+'_带备注.html';document.body.appendChild(a);a.click();a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    showHint('✅ 已下载副本');
}

/* ========== 启动 ========== */
function init(){
    if(initDone)return;initDone=true;
    try{
        originalHTMLSnapshot=document.documentElement.outerHTML;
        loadData();injectStyle();createToolbar();renderBadges();
        document.addEventListener('mousemove',onDocMove);
        document.addEventListener('mouseup',onDocUp);
        document.addEventListener('click',onDocClick,true);
        window.addEventListener('resize',function(){var b=document.getElementById('ann-toolbar');if(b)clampBar(b);});
        setInterval(function(){var a=getActiveScope(),ind=document.getElementById('ann-layer');if(ind&&ind.dataset.lastKey!==a.layerKey+':'+a.layer){ind.dataset.lastKey=a.layerKey+':'+a.layer;renderBadges();}},400);
        if(window.MutationObserver){var mo=new MutationObserver(function(muts){for(var i=0;i<muts.length;i++){if(isToolEl(muts[i].target))continue;clearTimeout(init._t);init._t=setTimeout(renderBadges,150);return;}});mo.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style','class','hidden','aria-hidden']});}
        tryRestoreHandle();
        console.log(LOG,'✅ 启动完成 · 共',annotations.length,'条 · 层级：',getActiveScope().name);
        if(annotations.length>0)showSaveStatus('✓ 已加载 '+annotations.length+' 条');
    }catch(e){console.error(LOG,'失败',e);}
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
window.addEventListener('load',init);
setTimeout(function(){if(!initDone&&document.body)init();},1000);
})();
</script>
